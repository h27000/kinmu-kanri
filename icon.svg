<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- 背景 -->
  <rect width="192" height="192" rx="42" fill="#8B0000"/>
  <!-- 光沢 -->
  <rect width="192" height="96" rx="42" fill="white" opacity=".04"/>
  <!-- 外リング -->
  <circle cx="96" cy="96" r="66" fill="none" stroke="#FF4444" stroke-width="2" opacity=".4"/>
  <!-- 文字盤 -->
  <circle cx="96" cy="96" r="54" fill="#6B0000"/>
  <!-- 目盛り（4点） -->
  <line x1="96" y1="44" x2="96" y2="57" stroke="#FF6666" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="135" x2="96" y2="148" stroke="#FF6666" stroke-width="5" stroke-linecap="round"/>
  <line x1="44" y1="96" x2="57" y2="96" stroke="#FF6666" stroke-width="5" stroke-linecap="round"/>
  <line x1="135" y1="96" x2="148" y2="96" stroke="#FF6666" stroke-width="5" stroke-linecap="round"/>
  <!-- 分針（細く長い・白） -->
  <line x1="96" y1="96" x2="96" y2="50" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 時針（太く短い・白） -->
  <line x1="96" y1="96" x2="123" y2="83" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="96" cy="96" r="6" fill="#FF4444"/>
</svg>
