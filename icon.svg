<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E00000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- 白いリング -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="white" stroke-width="6"/>
  <!-- 薄い内リング -->
  <circle cx="96" cy="96" r="56" fill="none" stroke="white" stroke-width="1.5" opacity=".3"/>
  <!-- 目盛り（12時・太） -->
  <line x1="96" y1="28" x2="96" y2="42" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- 目盛り（3・6・9時） -->
  <line x1="96" y1="150" x2="96" y2="164" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="96" x2="42" y2="96" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="150" y1="96" x2="164" y2="96" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 目盛り（斜め4点） -->
  <line x1="46.5" y1="46.5" x2="56.4" y2="56.4" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
  <line x1="145.5" y1="145.5" x2="135.6" y2="135.6" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
  <line x1="145.5" y1="46.5" x2="135.6" y2="56.4" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
  <line x1="46.5" y1="145.5" x2="56.4" y2="135.6" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".6"/>
  <!-- 分針（白・細・長） -->
  <line x1="96" y1="96" x2="96" y2="38" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- 時針（白・太・短） -->
  <line x1="96" y1="96" x2="128" y2="80" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- 秒針（白・極細） -->
  <line x1="96" y1="96" x2="70" y2="140" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".8"/>
  <!-- 中心 -->
  <circle cx="96" cy="96" r="9" fill="white"/>
  <circle cx="96" cy="96" r="4" fill="#CC0000"/>
</svg>
